# 物理学院信息源：统一使用 Seminars 学术报告页（大学城）。
# 历史全量（31 页，606 条 2009–2026）已一次性抓取并持久化在 data/lectures.json；
# 日常增量只需扫描最新的第 1、2 页即可捕获新发布的讲座（均 all_items 模式：
# 列表页即讲座列表，标题不含关键词需绕过 is_lecture 过滤）。
# 如需全量重建，临时把 3.html…31.html 追加回来再跑 --full 即可。

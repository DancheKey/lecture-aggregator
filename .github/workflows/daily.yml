name: 每日自动拉取讲座数据

# 触发条件：
#   1) 定时：北京时间每天 03:00（GitHub Actions 使用 UTC，03:00 CST = 19:00 UTC 前一天）
#   2) 手动：在 Actions 页面点 "Run workflow"，或网站「抓取新数据」按钮经代理触发
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch: {}

# 本工作流需要写回仓库（提交更新后的数据），并发布 Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 同一时间只跑一个抓取任务；新触发排队（不取消正在跑的），避免并发写冲突
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # 需要完整历史以便增量基线

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # EasyOCR 依赖 OpenCV，运行需要系统级图形库；缺少会导致 import 失败
      - name: 安装系统依赖（OpenCV/EasyOCR）
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      # 缓存 EasyOCR 识别模型（约百 MB），避免每次重新下载
      - name: 缓存 EasyOCR 模型
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-v1

      - name: 安装 Python 依赖
        run: pip install -r scraper/requirements.txt

      # 增量抓取：若仓库内 data/last_scrape.json 存在，则只补该时间之后的新讲座；
      # 否则（首次或缺失）自动全量，并以已有 data/lectures.json 作去重基底。
      - name: 运行爬虫（增量）
        run: python scraper/scraper.py

      - name: 同步静态数据源
        run: cp data/lectures.json site/lectures.json

      - name: 提交并推送（仅在有变化时）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lectures.json data/last_scrape.json site/lectures.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore: 自动更新讲座数据 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      # 下面步骤将 site/ 发布为 GitHub Pages。
      # 注意：本工作流用 GITHUB_TOKEN 推送的数据提交不会触发 deploy.yml，
      # 因此由本工作流直接完成部署，保证每日新数据即时上线。
      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传站点产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
